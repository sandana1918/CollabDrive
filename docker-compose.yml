services:
  mongo:
    image: mongo:8.0
    container_name: collabdrive-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: collabdrive-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      CLIENT_URL: http://localhost:4173
      MONGODB_URI: mongodb://mongo:27017/collabdrive
      JWT_SECRET: collabdrive_docker_secret_change_me
      JWT_EXPIRES_IN: 7d
      STORAGE_PROVIDER: local
      LOCAL_UPLOAD_DIR: uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/server/uploads

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile.local
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    container_name: collabdrive-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  mongo_data:
  uploads_data:
